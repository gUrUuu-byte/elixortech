<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Elixor Technologies | MVP Development Company & SaaS Engineering Agency</title>
    <meta name="description" content="We build launch-ready MVPs and SaaS platforms in just 21 days. Rapid product development for startups globally. Stop waiting, start shipping." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["Organization", "ProfessionalService"],
      "name": "Elixor Technologies",
      "url": "https://www.elixortechnologies.com",
      "logo": "https://www.elixortechnologies.com/logo.png",
      "description": "We build launch-ready MVPs and SaaS platforms in just 21 days for startups globally.",
      "sameAs": [
        "https://www.linkedin.com/company/elixortechnologies",
        "https://twitter.com/elixortechnologies"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": "English"
      },
      "areaServed": "Worldwide",
      "priceRange": "$$$"
    }
    </script>

    <!-- JSON-LD Structured Data: WebSite (enables sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Elixor Technologies",
      "url": "https://www.elixortechnologies.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.elixortechnologies.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD Structured Data: ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Elixor Technologies",
      "url": "https://www.elixortechnologies.com",
      "description": "Full-stack MVP development agency delivering launch-ready products in 21 days using React, Next.js, Node.js, and MongoDB.",
      "priceRange": "$$",
      "areaServed": "Worldwide",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Software Development Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "MVP Development",
              "description": "Rapid minimum viable product development for startups, shipped in under 21 days."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "SaaS Platform Engineering",
              "description": "Scalable SaaS application development with modern tech stacks."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "CRM & ERP Systems",
              "description": "Custom CRM and ERP portal development with role-based access and analytics."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Website Development",
              "description": "High-performance company websites and landing pages with modern UI/UX."
            }
          }
        ]
      }
    }
    </script>

    <!-- JSON-LD: FAQ Page (mirrors the FAQ component) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What kind of projects does Elixor Technologies handle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We specialize in building MVPs, full-stack web apps, SaaS platforms, CRM systems, ERP portals, and company websites. From financial platforms like BookMyCA to enterprise-grade tools like ACTTS CRM."
          }
        },
        {
          "@type": "Question",
          "name": "How fast can you deliver a working product?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A typical MVP or landing page ships in under 4 weeks. More complex systems like ERP portals or CRM dashboards take 6-8 weeks."
          }
        },
        {
          "@type": "Question",
          "name": "What is your tech stack?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We work with React, Next.js, Node.js, TypeScript, Tailwind CSS, MongoDB, and PostgreSQL. For payments we integrate Razorpay."
          }
        },
        {
          "@type": "Question",
          "name": "How does the pricing work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer clear, milestone-based pricing that aligns with your startup's runway. No scope creep or runaway hourly bills."
          }
        },
        {
          "@type": "Question",
          "name": "Do you handle design as well, or just development?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We're end-to-end. UI/UX design, frontend development, backend engineering, database architecture, and deployment — all handled by us."
          }
        },
        {
          "@type": "Question",
          "name": "What happens after the project is delivered?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer post-launch support, bug fixes, and iterative improvements. Many clients continue working with us from MVP to growth stage."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get started?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hit the 'Book a Slot' button or 'Start your project' CTA. Fill in your details and we'll set up a discovery call."
          }
        }
      ]
    }
    </script>
  </head>

</html>
